version: "3"

services:
  payload:
    image: node:24-alpine
    ports:
      - "3000:3000"
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install && pnpm dev"
    env_file:
      - .env

volumes:
  data:
  pgdata:
  node_modules:
